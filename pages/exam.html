<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>答题板块 - 人脸识别微课</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="header">
        <h2 class="logo">人脸识别微课</h2>
        <div class="nav">
            <div class="dropdown">
                <a class="dropdown-btn">学习板块</a>
                <div class="dropdown-content">
                    <a href="../index.html">微课学习</a>
                    <a href="./learn-apply.html">应用场景</a>
                    <a href="./learn-expand.html">拓展学习</a>
                </div>
            </div>
            <a href="./exam.html" class="active">答题板块</a>
        </div>
    </div>

    <div class="content">
        <div class="exam-card">
            <h3>人脸识别微课课后练习题（每题10分，共100分）</h3>

            <div class="question" id="q1">
                <h4>1. 计算机人脸识别的四步核心流程中，第一步是？（）</h4>
                <label class="option"><input type="radio" name="q1" value="A"> A. 人脸特征提取</label>
                <label class="option"><input type="radio" name="q1" value="B"> B. 人脸匹配</label>
                <label class="option"><input type="radio" name="q1" value="C"> C. 人脸检测</label>
                <label class="option"><input type="radio" name="q1" value="D"> D. 人脸对齐</label>
                <div class="analysis" id="analysis1"></div>
            </div>

            <div class="question" id="q2">
                <h4>2. 计算机通过哪种技术提取人脸关键特征，生成“数字身份证”？（）</h4>
                <label class="option"><input type="radio" name="q2" value="A"> A. 数据统计</label>
                <label class="option"><input type="radio" name="q2" value="B"> B. 深度学习</label>
                <label class="option"><input type="radio" name="q2" value="C"> C. 人工标注</label>
                <label class="option"><input type="radio" name="q2" value="D"> D. 图像裁剪</label>
                <div class="analysis" id="analysis2"></div>
            </div>

            <div class="question" id="q3">
                <h4>3. 以下哪种行为不利于保护人脸信息？（）</h4>
                <label class="option"><input type="radio" name="q3" value="A"> A. 在陌生小APP录入人脸信息</label>
                <label class="option"><input type="radio" name="q3" value="B"> B. 不随意发布高清人脸照片</label>
                <label class="option"><input type="radio" name="q3" value="C"> C. 拒绝强制“刷脸”要求</label>
                <label class="option"><input type="radio" name="q3" value="D"> D. 举报非法采集人脸信息的平台</label>
                <div class="analysis" id="analysis3"></div>
            </div>

            <div class="question" id="q4">
                <h4>4. 人脸对齐的主要目的是？（）</h4>
                <label class="option"><input type="radio" name="q4" value="A"> A. 放大人脸图像</label>
                <label class="option"><input type="radio" name="q4" value="B"> B. 统一不同角度人脸的姿态</label>
                <label class="option"><input type="radio" name="q4" value="C"> C. 模糊人脸背景</label>
                <label class="option"><input type="radio" name="q4" value="D"> D. 增加人脸特征数量</label>
                <div class="analysis" id="analysis4"></div>
            </div>

            <div class="question" id="q5">
                <h4>5. 人脸信息受哪部法律严格保护？（）</h4>
                <label class="option"><input type="radio" name="q5" value="A"> A. 《消费者权益保护法》</label>
                <label class="option"><input type="radio" name="q5" value="B"> B. 《刑法》</label>
                <label class="option"><input type="radio" name="q5" value="C"> C. 《交通安全法》</label>
                <label class="option"><input type="radio" name="q5" value="D"> D. 《教育法》</label>
                <div class="analysis" id="analysis5"></div>
            </div>

            <div class="question" id="q6">
                <h4>6. 人脸检测的主要作用是？（）</h4>
                <label class="option"><input type="radio" name="q6" value="A"> A. 给人脸定位并截取人脸区域</label>
                <label class="option"><input type="radio" name="q6" value="B"> B. 生成人脸数字代码</label>
                <label class="option"><input type="radio" name="q6" value="C"> C. 对比人脸相似度</label>
                <label class="option"><input type="radio" name="q6" value="D"> D. 修正人脸姿态</label>
                <div class="analysis" id="analysis6"></div>
            </div>

            <div class="question" id="q7">
                <h4>7. 计算机识别人脸时，最终对比的是？（）</h4>
                <label class="option"><input type="radio" name="q7" value="A"> A. 人脸照片</label>
                <label class="option"><input type="radio" name="q7" value="B"> B. 人脸特征数字代码</label>
                <label class="option"><input type="radio" name="q7" value="C"> C. 人脸轮廓</label>
                <label class="option"><input type="radio" name="q7" value="D"> D. 人脸肤色</label>
                <div class="analysis" id="analysis7"></div>
            </div>

            <div class="question" id="q8">
                <h4>8. 以下哪项不属于人脸识别的应用场景？（）</h4>
                <label class="option"><input type="radio" name="q8" value="A"> A. 手机刷脸解锁</label>
                <label class="option"><input type="radio" name="q8" value="B"> B. 校园刷脸门禁</label>
                <label class="option"><input type="radio" name="q8" value="C"> C. 手动输入密码</label>
                <label class="option"><input type="radio" name="q8" value="D"> D. 机场刷脸安检</label>
                <div class="analysis" id="analysis8"></div>
            </div>

            <div class="question" id="q9">
                <h4>9. 人脸匹配通过什么判断是否为同一人？（）</h4>
                <label class="option"><input type="radio" name="q9" value="A"> A. 人脸颜色深浅</label>
                <label class="option"><input type="radio" name="q9" value="B"> B. 特征相似度分数</label>
                <label class="option"><input type="radio" name="q9" value="C"> C. 人脸大小</label>
                <label class="option"><input type="radio" name="q9" value="D"> D. 拍照背景</label>
                <div class="analysis" id="analysis9"></div>
            </div>

            <div class="question" id="q10">
                <h4>10. 关于人脸识别，说法错误的是？（）</h4>
                <label class="option"><input type="radio" name="q10" value="A"> A. 化妆后核心人脸特征不会改变</label>
                <label class="option"><input type="radio" name="q10" value="B"> B. 人脸识别速度快、精度高</label>
                <label class="option"><input type="radio" name="q10" value="C"> C. 可以随意向陌生平台提供人脸信息</label>
                <label class="option"><input type="radio" name="q10" value="D"> D. 人脸信息属于敏感个人信息</label>
                <div class="analysis" id="analysis10"></div>
            </div>

            <button id="submitBtn">提交试卷</button>
            <div id="scoreResult" class="score-result"></div>
        </div>
    </div>
    <script src="../js/main.js"></script>
</body>

</html>
