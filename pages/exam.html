<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>答题板块 - 人脸识别微课</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="header">
        <h2>人脸识别微课 - 课后答题板块</h2>
        <div class="nav">
            <a href="./learn.html">学习板块</a>
            <a href="./exam.html">答题板块</a>
            <a href="../index.html">退出登录</a>
        </div>
    </div>
    <div class="content">
        <div class="exam-card">
            <h3>人脸识别微课课后练习题（每题10分，共30分）</h3>
            <!-- 题目1 -->
            <div class="question">
                <h4>1. 计算机人脸识别的四步核心流程中，第一步是？（）</h4>
                <div class="option"><input type="radio" name="q1" value="A"> A. 人脸特征提取</div>
                <div class="option"><input type="radio" name="q1" value="B"> B. 人脸匹配</div>
                <div class="option"><input type="radio" name="q1" value="C"> C. 人脸检测</div>
                <div class="option"><input type="radio" name="q1" value="D"> D. 人脸对齐</div>
            </div>
            <!-- 题目2 -->
            <div class="question">
                <h4>2. 计算机通过哪种技术提取人脸关键特征，生成“数字身份证”？（）</h4>
                <div class="option"><input type="radio" name="q2" value="A"> A. 数据统计</div>
                <div class="option"><input type="radio" name="q2" value="B"> B. 深度学习</div>
                <div class="option"><input type="radio" name="q2" value="C"> C. 人工标注</div>
                <div class="option"><input type="radio" name="q2" value="D"> D. 图像裁剪</div>
            </div>
            <!-- 题目3 -->
            <div class="question">
                <h4>3. 以下哪种行为不利于保护人脸信息？（）</h4>
                <div class="option"><input type="radio" name="q3" value="A"> A. 在陌生小APP录入人脸信息</div>
                <div class="option"><input type="radio" name="q3" value="B"> B. 不随意发布高清人脸照片</div>
                <div class="option"><input type="radio" name="q3" value="C"> C. 拒绝强制“刷脸”要求</div>
                <div class="option"><input type="radio" name="q3" value="D"> D. 举报非法采集人脸信息的平台</div>
            </div>
            <button id="submitBtn">提交试卷</button>
            <div id="scoreResult"></div>
        </div>
    </div>
    <script src="../js/main.js"></script>
</body>

</html>
