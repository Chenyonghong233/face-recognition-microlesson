<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人脸识别微课 - AI问答</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .ai-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            height: calc(100vh - 120px);
            display: flex;
            flex-direction: column;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
            margin-bottom: 20px;
        }

        .chat-item {
            margin: 15px 0;
            display: flex;
            max-width: 85%;
        }

        .chat-ai {
            flex-direction: row;
        }

        .chat-ai .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #3498db;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .chat-ai .bubble {
            background: #f5f7fa;
            border: 1px solid #e0e0e0;
            border-radius: 12px 12px 12px 4px;
            padding: 15px 20px;
            font-size: 16px;
            line-height: 1.7;
            color: #333;
        }

        .chat-user {
            flex-direction: row-reverse;
            margin-left: auto;
        }

        .chat-user .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #2c3e50;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            margin-left: 12px;
            flex-shrink: 0;
        }

        .chat-user .bubble {
            background: #3498db;
            border-radius: 12px 12px 4px 12px;
            padding: 15px 20px;
            font-size: 16px;
            line-height: 1.7;
            color: #fff;
        }

        .input-area {
            position: sticky;
            bottom: 0;
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.05);
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-area textarea {
            flex: 1;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 16px;
            line-height: 1.5;
            resize: none;
            min-height: 60px;
            max-height: 200px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-area textarea:focus {
            border-color: #3498db;
        }

        .input-area button {
            background: #3498db;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .input-area button:hover {
            background: #2980b9;
        }

        .input-area button:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 576px) {
            .ai-content {
                height: calc(100vh - 100px);
                padding: 10px;
            }

            .chat-item {
                max-width: 95%;
            }

            .chat-ai .avatar,
            .chat-user .avatar {
                width: 36px;
                height: 36px;
                font-size: 16px;
            }

            .chat-ai .bubble,
            .chat-user .bubble {
                padding: 12px 15px;
                font-size: 15px;
            }

            .input-area {
                padding: 10px;
            }

            .input-area textarea {
                min-height: 50px;
                font-size: 15px;
            }

            .input-area button {
                padding: 10px 15px;
                font-size: 15px;
            }
        }

        @media (min-width: 768px) {

            .chat-ai .bubble,
            .chat-user .bubble {
                font-size: 18px;
                padding: 18px 22px;
            }

            .input-area textarea {
                font-size: 18px;
                min-height: 70px;
            }

            .input-area button {
                padding: 15px 25px;
                font-size: 18px;
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <h2 class="logo">人脸识别微课</h2>
        <div class="nav">
            <div class="dropdown">
                <a class="dropdown-btn">学习板块</a>
                <div class="dropdown-content">
                    <a href="../index.html">微课学习</a>
                    <a href="./learn-apply.html">应用场景</a>
                    <a href="./learn-expand.html">拓展学习</a>
                </div>
            </div>
            <a href="./exam.html">答题板块</a>
            <a href="./ai.html" class="active">AI问答</a>
        </div>
    </div>

    <div class="ai-content">
        <div class="chat-list" id="chatList"></div>
        <div class="input-area">
            <textarea id="chatInput" placeholder="请输入你的问题，比如：人脸检测的原理是什么？"></textarea>
            <button id="sendBtn"><i class="bi bi-send"></i> 发送</button>
        </div>
    </div>

    <script>
        // ========== 本地问答知识库（可自行扩展） ==========
        const qaLibrary = [
            {
                keywords: ["人脸检测", "原理"],
                answer: "人脸检测的核心原理是：通过计算机视觉算法在图像中定位人脸区域。常用方法有两类：\n1. 传统方法：基于Haar特征+Adaboost分类器，通过识别人脸的五官、轮廓等特征模板匹配；\n2. 深度学习方法：基于CNN卷积神经网络，自动学习人脸的深层特征，准确率更高，抗干扰性强。"
            },
            {
                keywords: ["人脸信息", "保护", "隐私"],
                answer: "保护人脸信息的方法：\n1. 不随意授权App获取摄像头/人脸信息，关闭非必要的人脸解锁；\n2. 不在陌生平台上传高清人脸照片；\n3. 警惕人脸信息采集的线下场景（如不明门禁、营销扫码）；\n4. 利用法律维权：《个人信息保护法》明确人脸信息属于敏感个人信息，采集需单独同意。"
            },
            {
                keywords: ["人脸识别", "核心流程", "四步"],
                answer: "人脸识别的四步核心流程：\n1. 人脸检测：从图像/视频中定位人脸位置（找脸）；\n2. 人脸对齐：将检测到的人脸调整为标准姿态（矫正角度/大小）；\n3. 特征提取：提取人脸的唯一特征值（如五官距离、纹理等）；\n4. 特征匹配：将提取的特征与数据库中的特征对比，判断是否为同一人。"
            },
            {
                keywords: ["人脸识别", "应用场景"],
                answer: "人脸识别的常见应用场景：\n1. 安防领域：门禁打卡、监控追逃、小区/校园安防；\n2. 民生服务：政务大厅身份核验、火车站/机场刷脸检票；\n3. 移动支付：支付宝/微信刷脸支付；\n4. 娱乐场景：美颜相机、人脸特效、AR换脸。"
            },
            {
                keywords: ["人脸识别", "准确率", "影响因素"],
                answer: "影响人脸识别准确率的因素：\n1. 环境因素：光线（过亮/过暗）、遮挡（口罩/墨镜）、拍摄角度；\n2. 人脸状态：表情变化、年龄增长、化妆/整容；\n3. 算法本身：传统算法准确率约85%-95%，深度学习算法可达99%以上（理想环境）；\n4. 数据库质量：样本数量、多样性直接影响匹配精度。"
            }
        ];

        // ========== 全局变量 ==========
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatList = document.getElementById('chatList');
        let isSending = false; // 防止重复发送

        // ========== 初始化欢迎语 ==========
        function initWelcome() {
            const welcomeHtml = `
                <div class="chat-item chat-ai">
                    <div class="avatar"><i class="bi bi-robot"></i></div>
                    <div class="bubble">
                        你好！我是人脸识别微课的AI助手，有任何关于人脸识别的问题都可以问我～<br>
                        比如：<br>
                        1. 人脸检测的原理是什么？<br>
                        2. 如何保护自己的人脸信息？<br>
                        3. 人脸识别的四步核心流程是什么？
                    </div>
                </div>
            `;
            chatList.innerHTML = welcomeHtml;
            chatList.scrollTop = chatList.scrollHeight;
        }
        window.onload = initWelcome;

        // ========== 输入框高度自适应 ==========
        chatInput.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px';
        });

        // ========== 发送消息核心逻辑（本地匹配版） ==========
        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        async function sendMessage() {
            // 防止重复发送
            if (isSending) return;

            const userMsg = chatInput.value.trim();
            if (!userMsg) {
                alert("请输入问题！");
                return;
            }

            // 1. 添加用户消息到界面
            const userHtml = `
                <div class="chat-item chat-user">
                    <div class="avatar"><i class="bi bi-person"></i></div>
                    <div class="bubble">${userMsg}</div>
                </div>
            `;
            chatList.innerHTML += userHtml;
            chatInput.value = '';
            chatInput.style.height = 'auto'; // 重置输入框高度
            chatList.scrollTop = chatList.scrollHeight;

            // 2. 显示加载中（模拟思考过程）
            const loadingHtml = `
                <div class="chat-item chat-ai" id="loading">
                    <div class="avatar"><i class="bi bi-robot"></i></div>
                    <div class="bubble"><div class="loading"></div> 正在思考...</div>
                </div>
            `;
            chatList.innerHTML += loadingHtml;
            chatList.scrollTop = chatList.scrollHeight;
            sendBtn.disabled = true;
            isSending = true;

            try {
                // 3. 本地关键词匹配（模拟AI思考，延迟1秒更真实）
                await new Promise(resolve => setTimeout(resolve, 1000));
                let aiMsg = "抱歉，我暂时不了解这个问题～可以问问这些：<br>1. 人脸检测的原理是什么？<br>2. 人脸识别的核心流程？<br>3. 如何保护人脸隐私？";

                // 遍历问答库，匹配关键词
                for (const qa of qaLibrary) {
                    const hasMatch = qa.keywords.some(keyword => userMsg.includes(keyword));
                    if (hasMatch) {
                        aiMsg = qa.answer;
                        break;
                    }
                }

                // 4. 渲染AI回复
                document.getElementById('loading').remove();
                const aiHtml = `
                    <div class="chat-item chat-ai">
                        <div class="avatar"><i class="bi bi-robot"></i></div>
                        <div class="bubble">${aiMsg.replace(/\n/g, '<br>')}</div>
                    </div>
                `;
                chatList.innerHTML += aiHtml;

            } catch (err) {
                // 错误处理（本地模式基本不会触发）
                document.getElementById('loading').remove();
                const errorHtml = `
                    <div class="chat-item chat-ai">
                        <div class="avatar"><i class="bi bi-robot"></i></div>
                        <div class="bubble" style="color: #e74c3c;">
                            抱歉，回答失败：${err.message}
                        </div>
                    </div>
                `;
                chatList.innerHTML += errorHtml;
                console.error("【错误详情】", err);
            } finally {
                // 恢复发送状态
                sendBtn.disabled = false;
                isSending = false;
                chatList.scrollTop = chatList.scrollHeight;
            }
        }
    </script>
</body>

</html>
