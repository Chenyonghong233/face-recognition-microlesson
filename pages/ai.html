<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人脸识别微课 - AI问答</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .ai-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            height: calc(100vh - 120px);
            display: flex;
            flex-direction: column;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
            margin-bottom: 20px;
        }

        .chat-item {
            margin: 15px 0;
            display: flex;
            max-width: 85%;
        }

        .chat-ai {
            flex-direction: row;
        }

        .chat-ai .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #3498db;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .chat-ai .bubble {
            background: #f5f7fa;
            border: 1px solid #e0e0e0;
            border-radius: 12px 12px 12px 4px;
            padding: 15px 20px;
            font-size: 16px;
            line-height: 1.7;
            color: #333;
        }

        .chat-user {
            flex-direction: row-reverse;
            margin-left: auto;
        }

        .chat-user .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #2c3e50;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            margin-left: 12px;
            flex-shrink: 0;
        }

        .chat-user .bubble {
            background: #3498db;
            border-radius: 12px 12px 4px 12px;
            padding: 15px 20px;
            font-size: 16px;
            line-height: 1.7;
            color: #fff;
        }

        .input-area {
            position: sticky;
            bottom: 0;
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.05);
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-area textarea {
            flex: 1;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 16px;
            line-height: 1.5;
            resize: none;
            min-height: 60px;
            max-height: 200px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-area textarea:focus {
            border-color: #3498db;
        }

        .input-area button {
            background: #3498db;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .input-area button:hover {
            background: #2980b9;
        }

        .input-area button:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #999;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 576px) {
            .ai-content {
                height: calc(100vh - 100px);
                padding: 10px;
            }

            .chat-item {
                max-width: 95%;
            }

            .chat-ai .avatar,
            .chat-user .avatar {
                width: 36px;
                height: 36px;
                font-size: 16px;
            }

            .chat-ai .bubble,
            .chat-user .bubble {
                padding: 12px 15px;
                font-size: 15px;
            }

            .input-area {
                padding: 10px;
            }

            .input-area textarea {
                min-height: 50px;
                font-size: 15px;
            }

            .input-area button {
                padding: 10px 15px;
                font-size: 15px;
            }
        }

        @media (min-width: 768px) {

            .chat-ai .bubble,
            .chat-user .bubble {
                font-size: 18px;
                padding: 18px 22px;
            }

            .input-area textarea {
                font-size: 18px;
                min-height: 70px;
            }

            .input-area button {
                padding: 15px 25px;
                font-size: 18px;
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <h2 class="logo">人脸识别微课</h2>
        <div class="nav">
            <div class="dropdown">
                <a class="dropdown-btn">学习板块</a>
                <div class="dropdown-content">
                    <a href="../index.html">微课学习</a>
                    <a href="./learn-apply.html">应用场景</a>
                    <a href="./learn-expand.html">拓展学习</a>
                </div>
            </div>
            <a href="./exam.html">答题板块</a>
            <a href="./ai.html" class="active">AI问答</a>
        </div>
    </div>

    <div class="ai-content">
        <div class="chat-list" id="chatList"></div>
        <div class="input-area">
            <textarea id="chatInput" placeholder="请输入你的问题，比如：人脸检测的原理是什么？"></textarea>
            <button id="sendBtn"><i class="bi bi-send"></i> 发送</button>
        </div>
    </div>

    <script>
        // ========== 对接你的后端服务器（已配置完成） ==========
        const API_URL = "http://8.138.139.252:3000/api/chat";

        // ========== 全局变量 ==========
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatList = document.getElementById('chatList');
        let isSending = false;

        // ========== 初始化欢迎语 ==========
        function initWelcome() {
            const welcomeHtml = `
                <div class="chat-item chat-ai">
                    <div class="avatar"><i class="bi bi-robot"></i></div>
                    <div class="bubble">
                        你好！我是人脸识别微课的AI助手，有任何关于人脸识别的问题都可以问我～<br>
                        比如：<br>1. 人脸检测的原理是什么？<br>2. 如何保护人脸信息？<br>3. 人脸识别核心流程？
                    </div>
                </div>
            `;
            chatList.innerHTML = welcomeHtml;
            chatList.scrollTop = chatList.scrollHeight;
        }
        window.onload = initWelcome;

        // ========== 输入框自适应 ==========
        chatInput.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px';
        });

        // ========== 发送消息 ==========
        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        async function sendMessage() {
            if (isSending) return;
            const userMsg = chatInput.value.trim();
            if (!userMsg) {
                alert("请输入问题！");
                return;
            }

            // 1. 显示用户消息
            const userHtml = `
                <div class="chat-item chat-user">
                    <div class="avatar"><i class="bi bi-person"></i></div>
                    <div class="bubble">${userMsg}</div>
                </div>
            `;
            chatList.innerHTML += userHtml;
            chatInput.value = '';
            chatInput.style.height = 'auto';
            chatList.scrollTop = chatList.scrollHeight;

            // 2. 显示加载中
            const loadingHtml = `
                <div class="chat-item chat-ai" id="loading">
                    <div class="avatar"><i class="bi bi-robot"></i></div>
                    <div class="bubble"><div class="loading"></div> 正在思考...</div>
                </div>
            `;
            chatList.innerHTML += loadingHtml;
            chatList.scrollTop = chatList.scrollHeight;
            sendBtn.disabled = true;
            isSending = true;

            try {
                // 3. 请求你的后端服务器
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: userMsg })
                });

                const result = await response.json();
                let aiMsg = result.output?.text || "抱歉，我暂时无法回答";

                // 4. 显示AI回复
                document.getElementById('loading').remove();
                const aiHtml = `
                    <div class="chat-item chat-ai">
                        <div class="avatar"><i class="bi bi-robot"></i></div>
                        <div class="bubble">${aiMsg.replace(/\n/g, '<br>')}</div>
                    </div>
                `;
                chatList.innerHTML += aiHtml;

            } catch (err) {
                document.getElementById('loading').remove();
                const errorHtml = `
                    <div class="chat-item chat-ai">
                        <div class="avatar"><i class="bi bi-robot"></i></div>
                        <div class="bubble" style="color:red;">连接失败，请检查服务器是否运行</div>
                    </div>
                `;
                chatList.innerHTML += errorHtml;
            } finally {
                sendBtn.disabled = false;
                isSending = false;
                chatList.scrollTop = chatList.scrollHeight;
            }
        }
    </script>
</body>

</html>
