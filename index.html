<!DOCTYPE html>
<html lang="zh-CN">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人脸识别微课 - 课后拓展平台</title>
    <!-- 引入全局样式 -->
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <div class="login-container">
        <h1>人脸识别微课课后拓展平台</h1>

    </div>
    <!-- 引入全局脚本 -->
    <script src="./js/main.js"></script>

</html>
